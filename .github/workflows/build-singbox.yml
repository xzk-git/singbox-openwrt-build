name: Build full-featured sing-box for OpenWrt (aarch64_cortex-a53)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repo
      uses: actions/checkout@v4

    - name: Install build dependencies
      run: |
        sudo apt update
        sudo apt install -y \
          build-essential clang flex bison g++ gawk gcc-multilib \
          gettext git libncurses5-dev libssl-dev \
          python3-setuptools python3-pip python3-wheel \
          rsync unzip zlib1g-dev

    - name: Download OpenWrt SDK (23.05.5 mediatek/filogic)
      run: |
        wget https://downloads.openwrt.org/releases/23.05.5/targets/mediatek/filogic/openwrt-sdk-23.05.5-mediatek-filogic_gcc-12.3.0_musl.Linux-x86_64.tar.xz
        tar -xJf openwrt-sdk-23.05.5-mediatek-filogic_gcc-12.3.0_musl.Linux-x86_64.tar.xz
        mv openwrt-sdk-23.05.5-mediatek-filogic_gcc-12.3.0_musl.Linux-x86_64 sdk

    - name: Add feeds and install sing-box (correct 23.05 branch)
      run: |
        cd sdk
        echo "src-git packages https://github.com/openwrt/packages.git;openwrt-23.05" >> feeds.conf.default
        ./scripts/feeds update -a
        ./scripts/feeds install sing-box

    - name: Enable sing-box
      run: |
        cd sdk
        make defconfig
        echo "CONFIG_PACKAGE_sing-box=y" >> .config
        make defconfig

    - name: Build sing-box package
      run: |
        cd sdk
        make package/sing-box/compile V=s

    - name: Debug list SDK output
      run: |
        echo "Listing SDK output:"
        find sdk/bin -type f -maxdepth 4

    - name: Upload sing-box ipk artifact
      uses: actions/upload-artifact@v4
      with:
        name: sing-box-aarch64_cortex-a53
        path: |
          sdk/bin/packages/**/sing-box_*.ipk
